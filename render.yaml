services:
  - type: web
    name: ctfn
    runtime: python
    region: frankfurt
    plan: starter
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn ctfn_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CTFN_USERS
        sync: false
      - key: CTFN_WS_USERNAME
        sync: false
      - key: CTFN_WS_PASSWORD
        sync: false
      - key: CTFN_TOKEN_HOURS
        value: 720
